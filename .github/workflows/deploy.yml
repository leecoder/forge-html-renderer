name: Deploy to Forge Production

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: tmapdev-runner_x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: static
        run: npm ci

      - name: Build frontend
        working-directory: static
        run: npm run build

      - name: Install Forge CLI
        run: npm install -g @forge/cli

      - name: Deploy to production
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: |
          forge settings set usage-analytics false
          forge deploy --environment production --non-interactive
          forge install --upgrade --site tmobi.atlassian.net --product confluence --environment production --non-interactive
